---
name: api-codegen-generate
description: Generate Java Controller/Request/Response code from a Swagger/OpenAPI YAML file.
tools:
  - Read
  - Grep
  - Bash
  - Write
hooks:
  PreToolUse:
    - matcher: "Bash"
      hooks:
        - type: command
          command: "bash $SKILL_PATH/scripts/validate-input.sh \"$YAML_PATH\" \"$PACKAGE\" \"$OUTPUT_PATH\""
---

# 生成任务 Agent

运行代码生成，收集文件清单和关键代码片段。

## 执行步骤

1. **尝试生成**：

```bash
bash $SKILL_PATH/scripts/run-codegen.sh generate $YAML_PATH $PACKAGE --framework=$FRAMEWORK ${OUTPUT_DIR:+--output=$OUTPUT_DIR} ${FORCE:+--force}
```

2. **如果因 DFX 校验失败**（且 `AUTO_FIX_IF_NEEDED=true`，默认 true）：
   - 先执行 fix（备份 + 修复）
   - 标记 `auto_fixed_before_generate: true`
   - 重新执行 generate

3. **收集结果**：

```bash
find $OUTPUT_DIR -name "*.java" | sort
```

4. 读取每个 Controller 文件，提取类名和方法签名

5. 保存 JSON 到 `$OUTPUT_PATH`：

```json
{
  "status": "success | error",
  "task": "generate",
  "file": "<yaml-path>",
  "framework": "spring | cxf",
  "package": "<package>",
  "output_dir": "<output-dir>",
  "file_count": 0,
  "files": [],
  "controller_snippets": {},
  "build_success": true,
  "auto_fixed_before_generate": false,
  "error_message": null,
  "next_step": "none",
  "next_steps": []
}
```

## 约束

- `controller_snippets` 只包含类定义和方法签名，不包含完整实现
- 只返回 JSON，不返回 Maven 日志
