# 手动修复示例 - 包含无法自动修复的问题
#
# 用于测试"需手动"按钮和手动修复表单

swagger: '2.0'
info:
  version: v1
  title: 手动修复测试 API
basePath: /api/v1

paths:
  # 场景1: DFX-020 同一路径下类注解不一致（无法自动修复，无locator）
  /inconsistent:
    x-java-class-annotations:
      - "@Secured"
    get:
      summary: 获取资源
      operationId: getInconsistent
      x-java-class-annotations:
        - "@DifferentAnnotation"
      responses:
        '200':
          description: 成功
    post:
      summary: 创建资源
      operationId: createInconsistent
      responses:
        '201':
          description: 创建成功

  # 场景2: DFX-003 必填参数缺少校验（需手动确认）
  /manual/notnull:
    get:
      summary: 必填参数无校验
      operationId: manualNotNull
      parameters:
        - name: code
          in: query
          required: true
          description: 编码
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: 成功

  # 场景3: DFX-003 另一个必填参数
  /manual/notnull2:
    post:
      summary: 另一个必填参数
      operationId: manualNotNull2
      parameters:
        - name: token
          in: header
          required: true
          description: 令牌
          schema:
            type: string
            minLength: 1
            maxLength: 255
      responses:
        '200':
          description: 成功
